# docker-compose.yml
#
# One command to bring up the full EcoGrid-Agent stack:
#   docker compose up --build
#
# First-time data seeding (Qdrant policies + Postgres market prices):
#   docker compose --profile seed run --rm ingest
#
# Environment handling:
#   * ${VAR:-default} syntax: falls back to the default if .env is missing the value.
#   * GEMINI_API_KEY has no default — it MUST be set in .env.

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecogrid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecogrid}
      POSTGRES_USER: ${POSTGRES_USER:-ecogrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecogrid}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecogrid} -d ${POSTGRES_DB:-ecogrid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecogrid-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ecogrid-qdrant
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "6333:6333"
    # Intentionally no healthcheck here because the upstream image
    # may not include common probes (nc/curl/wget). Docker will keep
    # the container running even without a healthcheck; dependent
    # services rely on explicit readiness checks where needed.

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: ecogrid-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ecogrid}
      POSTGRES_USER: ${POSTGRES_USER:-ecogrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecogrid}
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-ecogrid}:${POSTGRES_PASSWORD:-ecogrid}@postgres:5432/${POSTGRES_DB:-ecogrid}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      QDRANT_URL: http://qdrant:6333
      RAG_QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-grid_policies}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set in .env}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      BATTERY_CAPACITY_KWH: ${BATTERY_CAPACITY_KWH:-1000.0}
      MAX_CHARGE_RATE_KW: ${MAX_CHARGE_RATE_KW:-250.0}
      DEFAULT_MIN_BATTERY_BUFFER: ${DEFAULT_MIN_BATTERY_BUFFER:-0.10}
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: ecogrid-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ecogrid}
      POSTGRES_USER: ${POSTGRES_USER:-ecogrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecogrid}
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-ecogrid}:${POSTGRES_PASSWORD:-ecogrid}@postgres:5432/${POSTGRES_DB:-ecogrid}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      QDRANT_URL: http://qdrant:6333
      RAG_QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-grid_policies}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set in .env}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      BATTERY_CAPACITY_KWH: ${BATTERY_CAPACITY_KWH:-1000.0}
      MAX_CHARGE_RATE_KW: ${MAX_CHARGE_RATE_KW:-250.0}
      DEFAULT_MIN_BATTERY_BUFFER: ${DEFAULT_MIN_BATTERY_BUFFER:-0.10}
    healthcheck:
      test: ["CMD", "celery", "-A", "services.workers.celery_app", "inspect", "ping", "-t", "5"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ingest:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ingest
    container_name: ecogrid-ingest
    profiles: ["seed"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ecogrid}
      POSTGRES_USER: ${POSTGRES_USER:-ecogrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecogrid}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-ecogrid}:${POSTGRES_PASSWORD:-ecogrid}@postgres:5432/${POSTGRES_DB:-ecogrid}
      QDRANT_URL: http://qdrant:6333
      RAG_QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-grid_policies}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set in .env}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    command: ["sh", "-c", "until curl -fsS http://qdrant:6333/collections >/dev/null 2>&1; do echo 'waiting for qdrant...'; sleep 1; done; python scripts/seed_vector_db.py && python scripts/seed_market_prices.py"]

volumes:
  pgdata:
  qdrantdata: